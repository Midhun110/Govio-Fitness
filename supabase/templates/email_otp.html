<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Your Govio Fitness Verification Code</title>
</head>
<body style="background-color: #000000; color: #FFFFFF; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 40px; margin: 0;">
  <div style="max-width: 500px; margin: 0 auto; background-color: #1E1E1E; border-radius: 16px; padding: 32px; border: 1px solid #222222; text-align: center;">
    <h1 style="color: #D4FF13; letter-spacing: 4px; font-size: 24px; margin-bottom: 24px;">GOVIO</h1>
    <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 12px; color: #FFFFFF;">Your Verification Code</h2>
    <p style="color: #A0A0A0; font-size: 14px; line-height: 1.5; margin-bottom: 24px;">
      Use the following 6-digit passcode to complete your sign in to Govio Fitness:
    </p>
    <div style="background-color: #121212; border: 1px solid #2A2A2A; border-radius: 12px; padding: 18px 24px; display: inline-block; margin-bottom: 24px;">
      <span style="font-size: 32px; font-weight: 900; letter-spacing: 8px; color: #D4FF13; font-family: monospace;">{{ .Token }}</span>
    </div>
    <p style="color: #7A7A7A; font-size: 12px; margin-top: 16px;">
      This passcode will expire in 60 minutes. If you did not request this code, you can safely ignore this email.
    </p>
  </div>
</body>
</html>
